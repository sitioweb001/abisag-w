<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobre Secreto Interactivo</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h2>Desliza hacia abajo para romper el sobre</h2>

<div class="env-wrapper" id="env">

  <!-- CARTA -->
  <div class="letter">
    <h1>Mi Querida Persona</h1>
    <p>
      Te escribo esta carta digital porque hay sentimientos
      que merecen descubrirse despacio.
    </p>
    <p class="highlight">Eres mi secreto favorito.</p>
    <p class="firma">Con cariño,<br>Tu admirador</p>
  </div>

  <!-- SOBRE -->
  <div class="envelope">
    <svg class="tear-svg" viewBox="0 0 500 280">
      <path id="tearPath" d="" />
    </svg>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
